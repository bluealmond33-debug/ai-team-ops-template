<path d="M182 347 h65 l14 14 h-79 z" fill="#A6E3A1" opacity="0.95"/>
<text x="275" y="356" class="label" font-size="21">02 Decisions</text>
<text x="275" y="379" class="tiny">중요 결정</text>
<rect x="615" y="325" width="370" height="64" rx="18" fill="#D9D9D9" stroke="#231E1B" stroke-width="2"/>
<path d="M637 347 h65 l14 14 h-79 z" fill="#F38BA8" opacity="0.95"/>
<text x="730" y="356" class="label" font-size="21">03 Research</text>
<text x="730" y="379" class="tiny">조사와 근거</text>
