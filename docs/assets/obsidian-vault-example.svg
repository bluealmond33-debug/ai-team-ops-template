<rect x="615" y="420" width="370" height="64" rx="18" fill="#D9D9D9" stroke="#231E1B" stroke-width="2"/>
<path d="M637 442 h65 l14 14 h-79 z" fill="#F2C14E" opacity="0.95"/>
<text x="730" y="451" class="label" font-size="21">05 Retros</text>
<text x="730" y="474" class="tiny">회고와 개선</text>
<text x="600" y="540" text-anchor="middle" style="font:800 24px sans-serif; fill:#231E1B;">AI가 한 일을 기록으로 남겨야 운영 방식이 자산이 됩니다</text>

</svg>
