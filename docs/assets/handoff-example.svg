<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="675" viewBox="0 0 1200 675" role="img" aria-label="Handoff Example">
  <defs>
    <pattern id="hatch" width="12" height="12" patternUnits="userSpaceOnUse" patternTransform="rotate(45)">
      <line x1="0" y1="0" x2="0" y2="12" stroke="#3a332f" stroke-width="2" opacity="0.45"/>
    </pattern>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="12" stdDeviation="10" flood-color="#000000" flood-opacity="0.22"/>
    </filter>
    <style>
      .title { font: 800 42px -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; fill: #D9D9D9; letter-spacing: -1px; }
      .subtitle { font: 500 21px -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; fill: #cfc7c1; }
      .label { font: 800 24px -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; fill: #231E1B; }
      .small { font: 600 17px -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; fill: #6B625D; }
      .tiny { font: 600 14px -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; fill: #6B625D; }
      .mono { font: 600 16px ui-monospace, SFMono-Regular, Menlo, Consolas, monospace; fill: #231E1B; }
      .monoSmall { font: 600 13px ui-monospace, SFMono-Regular, Menlo, Consolas, monospace; fill: #6B625D; }
    </style>
  </defs>
  <rect width="1200" height="675" fill="#231E1B"/>
  <rect width="1200" height="675" fill="url(#hatch)" opacity="0.35"/>
  <text x="70" y="82" class="title">AI에게 일을 맡기고 넘겨받는 양식</text>
<text x="72" y="118" class="subtitle">말로 흘려보내지 않고, 목표·근거·검증을 남깁니다</text>
<rect x="95" y="160" width="1010" height="420" rx="28" fill="#F3EEE8" stroke="#ffffff" stroke-width="2" filter="url(#shadow)"/><text x="135" y="220" class="label">HANDOFF</text>
<rect x="135" y="260" width="930" height="58" rx="16" fill="#D9D9D9" stroke="#F2C14E" stroke-width="4"/>
<text x="160" y="296" class="label" font-size="22">목표</text>
<text x="300" y="296" class="small">README를 KDA4 비개발자도 이해하게 개선</text>
<rect x="135" y="336" width="930" height="58" rx="16" fill="#D9D9D9" stroke="#89B4FA" stroke-width="4"/>
<text x="160" y="372" class="label" font-size="22">담당</text>
<text x="300" y="372" class="small">Researcher → Builder → Reviewer</text>
<rect x="135" y="412" width="930" height="58" rx="16" fill="#D9D9D9" stroke="#A6E3A1" stroke-width="4"/>
<text x="160" y="448" class="label" font-size="22">근거</text>
<text x="300" y="448" class="small">읽은 파일, 실행한 검증, 남은 위험</text>
<rect x="135" y="488" width="930" height="58" rx="16" fill="#D9D9D9" stroke="#F38BA8" stroke-width="4"/>
<text x="160" y="524" class="label" font-size="22">완료 조건</text>
<text x="300" y="524" class="small">README 반영 + secret scan OK + push 완료</text>

</svg>
