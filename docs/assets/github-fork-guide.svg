<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="675" viewBox="0 0 1200 675" role="img" aria-label="GitHub Fork Guide">
  <defs>
    <pattern id="hatch" width="12" height="12" patternUnits="userSpaceOnUse" patternTransform="rotate(45)">
      <line x1="0" y1="0" x2="0" y2="12" stroke="#3a332f" stroke-width="2" opacity="0.45"/>
    </pattern>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="12" stdDeviation="10" flood-color="#000000" flood-opacity="0.22"/>
    </filter>
    <style>
      .title { font: 800 42px -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; fill: #D9D9D9; letter-spacing: -1px; }
      .subtitle { font: 500 21px -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; fill: #cfc7c1; }
      .label { font: 800 24px -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; fill: #231E1B; }
      .small { font: 600 17px -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; fill: #6B625D; }
      .tiny { font: 600 14px -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; fill: #6B625D; }
      .mono { font: 600 16px ui-monospace, SFMono-Regular, Menlo, Consolas, monospace; fill: #231E1B; }
      .monoSmall { font: 600 13px ui-monospace, SFMono-Regular, Menlo, Consolas, monospace; fill: #6B625D; }
    </style>
  </defs>
  <rect width="1200" height="675" fill="#231E1B"/>
  <rect width="1200" height="675" fill="url(#hatch)" opacity="0.35"/>
  <text x="70" y="82" class="title">GitHub에서 내 복사본 만들기</text>
<text x="72" y="118" class="subtitle">오른쪽 위 Fork 버튼을 누르면 내 계정에 템플릿이 복사됩니다</text>
<rect x="80" y="170" width="1040" height="390" rx="30" fill="#F3EEE8" stroke="#ffffff" stroke-width="2" filter="url(#shadow)"/><rect x="80" y="170" width="1040" height="62" rx="30" fill="#E4DDD6"/>
<circle cx="120" cy="201" r="9" fill="#F38BA8"/><circle cx="148" cy="201" r="9" fill="#F2C14E"/><circle cx="176" cy="201" r="9" fill="#A6E3A1"/>
<text x="110" y="282" class="label">bluealmond33-debug / ai-team-ops-template</text>
<rect x="865" y="255" width="165" height="54" rx="16" fill="#231E1B"/>
<text x="947" y="290" text-anchor="middle" style="font:800 22px sans-serif; fill:#D9D9D9;">Fork</text>
<path d="M 825 360 C 875 320, 905 315, 940 310" fill="none" stroke="#F2C14E" stroke-width="8" stroke-linecap="round"/>
<path d="M 940 310 l -22 0 l 15 -17 z" fill="#F2C14E"/>
<rect x="180" y="360" width="380" height="104" rx="22" fill="#D9D9D9" stroke="#231E1B" stroke-width="2"/>
<text x="370" y="405" text-anchor="middle" class="label">1분이면 시작</text>
<text x="370" y="437" text-anchor="middle" class="small">설치보다 먼저 복사해서 구조를 보세요</text>
<text x="948" y="372" text-anchor="middle" style="font:800 26px sans-serif; fill:#231E1B;">여기를 클릭</text>

</svg>
