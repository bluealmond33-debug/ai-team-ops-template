<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="675" viewBox="0 0 1200 675" role="img" aria-label="AI Team Flow">
  <defs>
    <pattern id="hatch" width="12" height="12" patternUnits="userSpaceOnUse" patternTransform="rotate(45)">
      <line x1="0" y1="0" x2="0" y2="12" stroke="#3a332f" stroke-width="2" opacity="0.45"/>
    </pattern>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="12" stdDeviation="10" flood-color="#000000" flood-opacity="0.22"/>
    </filter>
    <style>
      .title { font: 800 42px -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; fill: #D9D9D9; letter-spacing: -1px; }
      .subtitle { font: 500 21px -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; fill: #cfc7c1; }
      .label { font: 800 24px -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; fill: #231E1B; }
      .small { font: 600 17px -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; fill: #6B625D; }
      .tiny { font: 600 14px -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; fill: #6B625D; }
      .mono { font: 600 16px ui-monospace, SFMono-Regular, Menlo, Consolas, monospace; fill: #231E1B; }
      .monoSmall { font: 600 13px ui-monospace, SFMono-Regular, Menlo, Consolas, monospace; fill: #6B625D; }
    </style>
  </defs>
  <rect width="1200" height="675" fill="#231E1B"/>
  <rect width="1200" height="675" fill="url(#hatch)" opacity="0.35"/>
  <text x="70" y="85" class="title">AI를 챗봇이 아니라 작은 팀처럼 운영하기</text>
<text x="72" y="122" class="subtitle">요청 → 역할 → 기록 → 검토 → 재사용까지 한 흐름으로 묶습니다</text>
<rect x="70" y="240" width="135" height="135" rx="28" fill="#D9D9D9" stroke="#f6f0e8" stroke-width="2" filter="url(#shadow)"/>
<circle cx="137" cy="282" r="22" fill="#F2C14E"/>
<text x="137" y="290" text-anchor="middle" class="label" font-size="24">1</text>
<text x="137" y="329" text-anchor="middle" class="label">아이디어</text>
<text x="137" y="356" text-anchor="middle" class="tiny">하고 싶은 일</text>
<line x1="215" y1="307" x2="245" y2="307" stroke="#e7ded7" stroke-width="5" stroke-linecap="round"/>
<path d="M 245 307 l -14 -9 l 0 18 z" fill="#e7ded7" transform="rotate(0 245 307)"/>
<rect x="255" y="240" width="135" height="135" rx="28" fill="#D9D9D9" stroke="#f6f0e8" stroke-width="2" filter="url(#shadow)"/>
<circle cx="322" cy="282" r="22" fill="#89B4FA"/>
<text x="322" y="290" text-anchor="middle" class="label" font-size="24">2</text>
<text x="322" y="329" text-anchor="middle" class="label">작업 요청</text>
<text x="322" y="356" text-anchor="middle" class="tiny">Issue/Handoff</text>
<line x1="400" y1="307" x2="430" y2="307" stroke="#e7ded7" stroke-width="5" stroke-linecap="round"/>
<path d="M 430 307 l -14 -9 l 0 18 z" fill="#e7ded7" transform="rotate(0 430 307)"/>
<rect x="440" y="240" width="135" height="135" rx="28" fill="#D9D9D9" stroke="#f6f0e8" stroke-width="2" filter="url(#shadow)"/>
<circle cx="507" cy="282" r="22" fill="#A6E3A1"/>
<text x="507" y="290" text-anchor="middle" class="label" font-size="24">3</text>
<text x="507" y="329" text-anchor="middle" class="label">AI 역할</text>
<text x="507" y="356" text-anchor="middle" class="tiny">리서처/빌더/리뷰어</text>
<line x1="585" y1="307" x2="615" y2="307" stroke="#e7ded7" stroke-width="5" stroke-linecap="round"/>
<path d="M 615 307 l -14 -9 l 0 18 z" fill="#e7ded7" transform="rotate(0 615 307)"/>
<rect x="625" y="240" width="135" height="135" rx="28" fill="#D9D9D9" stroke="#f6f0e8" stroke-width="2" filter="url(#shadow)"/>
<circle cx="692" cy="282" r="22" fill="#CBA6F7"/>
<text x="692" y="290" text-anchor="middle" class="label" font-size="24">4</text>
<text x="692" y="329" text-anchor="middle" class="label">작업 진행</text>
<text x="692" y="356" text-anchor="middle" class="tiny">근거 남기기</text>
<line x1="770" y1="307" x2="800" y2="307" stroke="#e7ded7" stroke-width="5" stroke-linecap="round"/>
<path d="M 800 307 l -14 -9 l 0 18 z" fill="#e7ded7" transform="rotate(0 800 307)"/>
<rect x="810" y="240" width="135" height="135" rx="28" fill="#D9D9D9" stroke="#f6f0e8" stroke-width="2" filter="url(#shadow)"/>
<circle cx="877" cy="282" r="22" fill="#F38BA8"/>
<text x="877" y="290" text-anchor="middle" class="label" font-size="24">5</text>
<text x="877" y="329" text-anchor="middle" class="label">사람 검토</text>
<text x="877" y="356" text-anchor="middle" class="tiny">확인과 수정</text>
<line x1="955" y1="307" x2="985" y2="307" stroke="#e7ded7" stroke-width="5" stroke-linecap="round"/>
<path d="M 985 307 l -14 -9 l 0 18 z" fill="#e7ded7" transform="rotate(0 985 307)"/>
<rect x="995" y="240" width="135" height="135" rx="28" fill="#D9D9D9" stroke="#f6f0e8" stroke-width="2" filter="url(#shadow)"/>
<circle cx="1062" cy="282" r="22" fill="#F2C14E"/>
<text x="1062" y="290" text-anchor="middle" class="label" font-size="24">6</text>
<text x="1062" y="329" text-anchor="middle" class="label">재사용</text>
<text x="1062" y="356" text-anchor="middle" class="tiny">다음 프로젝트로</text>
<rect x="170" y="455" width="860" height="95" rx="24" fill="#D9D9D9" opacity="0.96"/>
<text x="600" y="500" text-anchor="middle" class="label">핵심은 프롬프트보다 운영 방식입니다</text>
<text x="600" y="530" text-anchor="middle" class="small">AI가 한 일을 문서로 남기고, 사람이 마지막에 검토합니다</text>

</svg>
